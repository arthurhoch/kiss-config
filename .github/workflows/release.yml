name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        run: |
          case "${{ inputs.version }}" in
            *SNAPSHOT*|*snapshot*|"")
              echo "Release version must be non-SNAPSHOT." >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK and Maven Central credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: mvn -B versions:set -DnewVersion="${{ inputs.version }}" -DgenerateBackupPoms=false

      - name: Verify
        run: mvn -B clean verify

      - name: Deploy to Maven Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release -Dgpg.passphrase="${GPG_PASSPHRASE}" deploy

      - name: Commit release version
        run: |
          git add pom.xml
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --notes "Release v${{ inputs.version }}."
